<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLinks - Tu Nombre</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="card">
      <!-- FOTO DE PERFIL -->
      <!-- Cambia "Tu Nombre" en el atributo alt -->
      <img
        class="avatar"
        src="https://placehold.co/100x100/6c63ff/ffffff?text=YO"
        alt="Foto de Tu Nombre"
        width="100"
        height="100"
      />

      <h1 class="name">JOHN RIVAS TOLENTINO</h1>
      <p class="bio">
        Estudiante de desarrollo web y programación. Me apasiona el montañismo y el senderismo
      </p>

      <!-- ENLACES -->
      <!-- Cambia el href y el texto de cada enlace -->
      <!-- Puedes agregar o quitar enlaces según necesites como FACEBOOK,WHATTSAP,etc cualquier medio de contacto -->
      <nav class="links">
        <a href="https://www.facebook.com/johnpaul.rivastolentino?locale=es_LA" class="link" target="_blank">
          Facebok
        </a>

        <a href="https://github.com/JohnRivasT/mylinks.git" class="link"> GitHub </a>
      </nav>
    </main>
  </body>
</html>
